# Workflow para deploy automático no GitHub Pages
# Faz o build com Vite e publica a pasta dist/ no branch gh-pages.
#
# Trigger: push no branch main ou execução manual.
# Requisito: nas configurações do repositório GitHub, em
# Settings → Pages → Source, selecionar "GitHub Actions".

name: Deploy para GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultâneos
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        run: npm run build
        env:
          # Define o base path para o GitHub Pages
          # Substitua 'team-queue-indexeddb' pelo nome do repositório se diferente
          VITE_BASE_PATH: /team-queue-indexeddb/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

