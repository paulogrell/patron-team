<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a7f37" />
    <meta name="description" content="Gerenciador de fila de times - offline first com IndexedDB" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
    <title>Arjen - Fila de Times</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
    <script>
      // Registrar Service Worker para PWA offline
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Base deve ser URL absoluta; '/' quebra o construtor URL em vários browsers
          const baseTag = document.querySelector('base');
          const base =
            baseTag?.href ||
            window.location.href;
          const swUrl = new URL('sw.js', base).href;
          navigator.serviceWorker.register(swUrl)
            .then(reg => console.log('Service Worker registrado:', reg.scope))
            .catch(err => console.error('Erro ao registrar SW:', err));
        });
      }
    </script>
  </body>
</html>
